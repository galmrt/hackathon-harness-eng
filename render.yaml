services:
  - type: web
    name: hazardwatch
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CLICKHOUSE_HOST
        sync: false
      - key: CLICKHOUSE_PORT
        value: "8443"
      - key: CLICKHOUSE_DB
        value: hazardwatch
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_BASE_URL
        value: "https://us.cloud.langfuse.com"

  - type: cron
    name: hazardwatch-ingest
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 * * * *"
    startCommand: python -m ingest.poller
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CLICKHOUSE_HOST
        sync: false
      - key: CLICKHOUSE_PORT
        value: "8443"
      - key: CLICKHOUSE_DB
        value: hazardwatch
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_BASE_URL
        value: "https://us.cloud.langfuse.com"
